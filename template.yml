AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: Provision the AWS Lambda function of s3-monitor
###########################################################
Parameters:
###########################################################
  ENV:
    Type: String
    Default: dev
    Description: Environment name
  PROJECT:
    Type: String
    Default: no_name_project
    Description: Project name
  AWSREGION:
    Type: String
    Default: eu-west-3
    Description: AWS Region
  BUCKETSBLACKLIST:
    Type: String
    Default: no_bucket_defined
    Description: AWS S3 Bucket to exclude
  S3PREFIX:
    Type: String
    Default: no_prefix_defined
    Description: S3 prefix to monitor
  BOTOLAYER:
    Type: String
    Default: boto3
    Description: Layer name for boto3
  BOTOLAYERVERSION:
    Type: Number
    Default: 9
    Description: Layer version
  RECIPIENTS:
    Type: String
    Default: ''
    Description: Email recipients (comma-separated)
  SENDER:
    Type: String
    Default: ''
    Description: Email sender address
  AWSSESREGION:
    Type: String
    Default: eu-west-3
    Description: AWS SES Region
  SLACKWEBHOOKURL:
    Type: String
    Default: no_slack_webhook_defined
    Description: Slack Webhook URL
  SIZETHRESHOLDPERCENT:
    Type: Number
    Default: 50
    Description: Size threshold percentage to trigger alert (e.g. 50 means alert if today's backup is less than 50% of previous)
  BUCKETCOMPONENTS:
    Type: String
    Default: '{}'
    Description: JSON mapping bucket name to list of expected components ("etc","boot","site","db"). Buckets not listed keep the legacy "at least one file today" check.
  DASHBOARDAUTH:
    Type: String
    Default: ''
    NoEcho: true
    Description: Basic-auth credential "user:password" for the private dashboard.
  DASHBOARDALLOWEDIPS:
    Type: String
    Default: ''
    Description: Comma-separated CIDRs allowed to reach the dashboard (e.g. "51.15.226.5/32,203.0.113.0/24"). Empty = no IP restriction. If both this and DASHBOARDAUTH are empty the dashboard is fail-closed (503).
###########################################################
Resources:
###########################################################
  s3monitor:
    Type: 'AWS::Serverless::Function'
    Properties:
      FunctionName: !Sub s3-monitor-${ENV}
      Description: !Sub S3 Backup Monitor (${PROJECT})
      Handler: handlers.main
      Runtime: python3.9
      CodeUri: ./python
      MemorySize: 512
      Timeout: 300
      Layers:
        - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:${BOTOLAYER}:${BOTOLAYERVERSION}'
      Environment:
        Variables:
          S3PREFIX: !Ref S3PREFIX
          BUCKETSBLACKLIST: !Ref BUCKETSBLACKLIST
          RECIPIENTS: !Ref RECIPIENTS
          SENDER: !Ref SENDER
          AWSREGION: !Ref AWSREGION
          AWSSESREGION: !Ref AWSSESREGION
          SLACK_WEBHOOK_URL: !Ref SLACKWEBHOOKURL
          SIZE_THRESHOLD_PERCENT: !Ref SIZETHRESHOLDPERCENT
          BUCKET_COMPONENTS: !Ref BUCKETCOMPONENTS
      Policies:
        - AWSLambdaExecute # Managed Policy
        - Version: '2012-10-17' # Policy Document
          Statement:
            - Effect: Allow
              Action:
                - s3:List*
              Resource: [
                "arn:aws:s3:::*"
              ]
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: '*'
      Events:
        Timer:
          Type: Schedule
          Properties:
            Name: s3-monitor-schedule
            Schedule: cron(0 10 * * ? *)
      Tags:
        Project: !Ref PROJECT
        Environment: !Ref ENV
        Region: !Ref AWSREGION
  s3report:
    Type: 'AWS::Serverless::Function'
    Properties:
      FunctionName: !Sub s3-report-${ENV}
      Description: !Sub S3 Backup Daily Report (${PROJECT})
      Handler: handlers.report
      Runtime: python3.9
      CodeUri: ./python
      MemorySize: 512
      Timeout: 900
      Layers:
        - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:${BOTOLAYER}:${BOTOLAYERVERSION}'
      Environment:
        Variables:
          S3PREFIX: !Ref S3PREFIX
          BUCKETSBLACKLIST: !Ref BUCKETSBLACKLIST
          AWSREGION: !Ref AWSREGION
          SLACK_WEBHOOK_URL: !Ref SLACKWEBHOOKURL
          SIZE_THRESHOLD_PERCENT: !Ref SIZETHRESHOLDPERCENT
          BUCKET_COMPONENTS: !Ref BUCKETCOMPONENTS
      Policies:
        - AWSLambdaExecute
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:List*
              Resource:
                - "arn:aws:s3:::*"
      Events:
        Timer:
          Type: Schedule
          Properties:
            Name: s3-report-schedule
            Schedule: cron(0 10 * * ? *)
      Tags:
        Project: !Ref PROJECT
        Environment: !Ref ENV
        Region: !Ref AWSREGION

  s3dashboard:
    Type: 'AWS::Serverless::Function'
    Properties:
      FunctionName: !Sub s3-dashboard-${ENV}
      Description: !Sub Private HTML dashboard of all backups (${PROJECT})
      Handler: handlers.dashboard_http
      Runtime: python3.9
      CodeUri: ./python
      MemorySize: 512
      Timeout: 60
      Layers:
        - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:${BOTOLAYER}:${BOTOLAYERVERSION}'
      Environment:
        Variables:
          S3PREFIX: !Ref S3PREFIX
          BUCKETSBLACKLIST: !Ref BUCKETSBLACKLIST
          AWSREGION: !Ref AWSREGION
          SIZE_THRESHOLD_PERCENT: !Ref SIZETHRESHOLDPERCENT
          BUCKET_COMPONENTS: !Ref BUCKETCOMPONENTS
          DASHBOARD_AUTH: !Ref DASHBOARDAUTH
          DASHBOARD_ALLOWED_IPS: !Ref DASHBOARDALLOWEDIPS
      FunctionUrlConfig:
        AuthType: NONE
      Policies:
        - AWSLambdaExecute
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:List*
              Resource:
                - "arn:aws:s3:::*"
      Tags:
        Project: !Ref PROJECT
        Environment: !Ref ENV
        Region: !Ref AWSREGION

  ##########################################################################
  # Self-monitoring: alert when the monitoring Lambdas themselves fail.
  # Both Lambdas already use the same Slack webhook for backup alerts, so
  # the alarm forwarder reuses the same channel for consistency.
  ##########################################################################

  alarmTopic:
    Type: 'AWS::SNS::Topic'
    Properties:
      TopicName: !Sub s3monitor-alarms-${ENV}
      DisplayName: S3 monitor self-alarms

  alarmForwarder:
    Type: 'AWS::Serverless::Function'
    Properties:
      FunctionName: !Sub s3-monitor-alarm-forwarder-${ENV}
      Description: !Sub Forwards CloudWatch alarms to Slack (${PROJECT})
      Handler: handlers.alarm_forwarder
      Runtime: python3.9
      CodeUri: ./python
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          SLACK_WEBHOOK_URL: !Ref SLACKWEBHOOKURL
      Layers:
        - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:${BOTOLAYER}:${BOTOLAYERVERSION}'
      Events:
        AlarmSns:
          Type: SNS
          Properties:
            Topic: !Ref alarmTopic
      Tags:
        Project: !Ref PROJECT
        Environment: !Ref ENV

  s3monitorErrorsAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub s3-monitor-${ENV}-errors
      AlarmDescription: s3-monitor Lambda raised an unhandled error
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref s3monitor
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref alarmTopic

  s3monitorDurationAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub s3-monitor-${ENV}-duration
      AlarmDescription: s3-monitor Lambda is close to its 300s timeout (>250s)
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref s3monitor
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 250000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref alarmTopic

  s3reportErrorsAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub s3-report-${ENV}-errors
      AlarmDescription: s3-report Lambda raised an unhandled error
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref s3report
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref alarmTopic

  s3reportDurationAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub s3-report-${ENV}-duration
      AlarmDescription: s3-report Lambda is close to its 900s timeout (>800s)
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref s3report
      Statistic: Maximum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 800000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref alarmTopic

  # Catch the case where the scheduled run never happens at all (Lambda
  # never invoked → no Errors metric, no Duration metric, just silence).
  s3monitorInvocationsAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub s3-monitor-${ENV}-no-invocations
      AlarmDescription: s3-monitor Lambda did not run in the last 25h
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: !Ref s3monitor
      Statistic: Sum
      Period: 90000
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref alarmTopic

  s3reportInvocationsAlarm:
    Type: 'AWS::CloudWatch::Alarm'
    Properties:
      AlarmName: !Sub s3-report-${ENV}-no-invocations
      AlarmDescription: s3-report Lambda did not run in the last 25h
      Namespace: AWS/Lambda
      MetricName: Invocations
      Dimensions:
        - Name: FunctionName
          Value: !Ref s3report
      Statistic: Sum
      Period: 90000
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref alarmTopic

###########################################################
Outputs:
###########################################################
  DashboardUrl:
    Description: Private backup dashboard URL (HTTP Basic Auth via DASHBOARD_AUTH)
    Value: !GetAtt s3dashboardUrl.FunctionUrl
