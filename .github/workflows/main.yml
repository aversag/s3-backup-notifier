name: "deploy s3-backup-notifier"

on: 
  push:
    branches:
    - master

jobs:
  aws_sam:
    runs-on: ubuntu-latest
    steps:
      - name: Assume Role
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.REGION }}
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          role-duration-seconds: 1200
          role-session-name: GH-Actions

      - name: Checkout
        uses: actions/checkout@master

      - name: Test credentials - whoami
        run: |
          aws sts get-caller-identity

      - name: sam build
        uses: TractorZoom/sam-cli-action@master
        with:
          sam_command: build -b ./build

      - name: sam deploy
        uses: TractorZoom/sam-cli-action@master
        with:
          sam_command: |
            deploy \
              --template-file build/template.yaml \
              --stack-name ${{ secrets.PROJECT }}-${{ secrets.ENV }} \
              --s3-bucket ${{ secrets.PROJECT }}-artifacts \
              --region ${{ secrets.REGION }} \
              --no-fail-on-empty-changeset \
              --capabilities CAPABILITY_IAM \
              --parameter-overrides \
                ENV=${{ secrets.ENV }} \
                PROJECT=${{ secrets.PROJECT }} \
                S3PREFIX=${{ secrets.S3PREFIX }} \
                BUCKETSBLACKLIST=${{ secrets.BUCKETSBLACKLIST }} \
                AWSREGION=${{ secrets.REGION }} \
                SLACKWEBHOOKURL=${{ secrets.SLACK_WEBHOOK_URL }} \
                SIZETHRESHOLDPERCENT=${{ secrets.SIZE_THRESHOLD_PERCENT }}
