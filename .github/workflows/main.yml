name: "deploy s3-backup-notifier"

on:
  push:
    branches:
    - master

permissions:
  id-token: write
  contents: read

jobs:
  aws_sam:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::722738461861:role/github-actions-s3-backup-notifier
          role-session-name: gh-actions-s3-backup-notifier
          aws-region: eu-west-3

      - name: Verify credentials
        run: aws sts get-caller-identity

      - name: sam build
        uses: aws-actions/setup-sam@v2

      - name: Build
        run: sam build -b ./build

      - name: Deploy
        run: |
          sam deploy \
            --template-file build/template.yaml \
            --stack-name ${{ secrets.PROJECT }}-${{ secrets.ENV }} \
            --s3-bucket ${{ secrets.PROJECT }}-artifacts \
            --region eu-west-3 \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              ENV=${{ secrets.ENV }} \
              PROJECT=${{ secrets.PROJECT }} \
              S3PREFIX=${{ secrets.S3PREFIX }} \
              BUCKETSBLACKLIST=${{ secrets.BUCKETSBLACKLIST }} \
              AWSREGION=eu-west-3 \
              SLACKWEBHOOKURL=${{ secrets.SLACK_WEBHOOK_URL }} \
              SIZETHRESHOLDPERCENT=${{ secrets.SIZE_THRESHOLD_PERCENT }}
