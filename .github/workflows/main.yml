name: "deploy s3-backup-notifier"

on:
  push:
    branches:
    - master

permissions:
  id-token: write
  contents: read

jobs:
  aws_sam:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::722738461861:role/github-actions-s3-backup-notifier
          role-session-name: gh-actions-s3-backup-notifier
          aws-region: eu-west-3

      - name: Verify credentials
        run: aws sts get-caller-identity

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up SAM
        uses: aws-actions/setup-sam@v2

      - name: Build
        run: sam build -b ./build

      - name: Deploy
        env:
          BUCKET_COMPONENTS: ${{ secrets.BUCKET_COMPONENTS }}
          BUCKETS_BLACKLIST: ${{ secrets.BUCKETSBLACKLIST }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          S3PREFIX_VAL: ${{ secrets.S3PREFIX }}
          SIZE_THRESHOLD: ${{ secrets.SIZE_THRESHOLD_PERCENT }}
          ENV_VAL: ${{ secrets.ENV }}
          PROJECT_VAL: ${{ secrets.PROJECT }}
        run: |
          # sam deploy --parameter-overrides expects a single shorthand string.
          # Wrap BUCKETCOMPONENTS in single quotes inside that string so SAM's
          # parser preserves the JSON double-quotes verbatim.
          OVERRIDES="ENV=$ENV_VAL PROJECT=$PROJECT_VAL S3PREFIX=$S3PREFIX_VAL"
          OVERRIDES="$OVERRIDES BUCKETSBLACKLIST=$BUCKETS_BLACKLIST"
          OVERRIDES="$OVERRIDES AWSREGION=eu-west-3"
          OVERRIDES="$OVERRIDES SLACKWEBHOOKURL=$SLACK_WEBHOOK_URL"
          OVERRIDES="$OVERRIDES SIZETHRESHOLDPERCENT=$SIZE_THRESHOLD"
          OVERRIDES="$OVERRIDES BUCKETCOMPONENTS='$BUCKET_COMPONENTS'"
          sam deploy \
            --template-file build/template.yaml \
            --stack-name "$PROJECT_VAL-$ENV_VAL" \
            --s3-bucket "$PROJECT_VAL-artifacts" \
            --region eu-west-3 \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides "$OVERRIDES"
